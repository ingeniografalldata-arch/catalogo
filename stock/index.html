<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Disponible</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f1e8;
      color: #222;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
    }

    .titulo {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      border: 1px solid #ece7d8;
    }

    .card-img-wrap {
      width: 100%;
      background: #eee;
      aspect-ratio: 4 / 5;
      overflow: hidden;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 14px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.1;
      color: #222;
    }

    .card-subtitle {
      font-size: 14px;
      font-weight: 700;
      color: #6f6f6f;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .card-extra {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 2px;
    }

    .campo {
      font-size: 13px;
      color: #444;
      line-height: 1.35;
    }

    .campo strong {
      color: #222;
    }

    .descripcion {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
      margin-top: 2px;
    }

    .precio {
      font-size: 42px;
      font-weight: 900;
      color: #3a3227;
      line-height: 1;
      margin-top: 10px;
    }

    .precio small {
      font-size: 20px;
      font-weight: 700;
      margin-right: 4px;
    }

    .tallas {
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f3f0e8;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      color: #4d4d4d;
      letter-spacing: 1px;
    }

    .estado {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 10px;
    }

    .estado.disponible {
      background: #eef9ef;
      color: #1f7a30;
    }

    .estado.preventa {
      background: #fff7df;
      color: #9b7800;
    }

    .check {
      font-size: 16px;
      font-weight: 900;
    }

    .btn-whatsapp {
      margin-top: 10px;
      display: block;
      width: 100%;
      border: none;
      text-align: center;
      text-decoration: none;
      background: #1ec94c;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      padding: 14px 10px;
      border-radius: 14px;
      transition: 0.2s ease;
    }

    .btn-whatsapp:hover {
      background: #18b441;
    }

    @media (max-width: 768px) {
      .container {
        padding: 14px;
      }

      .grid {
        gap: 14px;
      }

      .card-title {
        font-size: 18px;
      }

      .precio {
        font-size: 34px;
      }

      .precio small {
        font-size: 17px;
      }

      .btn-whatsapp {
        font-size: 16px;
        padding: 12px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="titulo">Stock Disponible</h1>
    <div class="grid" id="productosGrid"></div>
  </div>

  <script>
    const productos = [
      {
        tela: "Win Fresh",
        codigo: "FUT172",
        descripcion: "Chaleco Hombre Futsalero",
        link: "https://res.cloudinary.com/demo/image/upload/sample.jpg",
        precio: 25,
        stock: 1,
        talla10: 0,
        talla12: 0,
        talla14: 0,
        talla16: 0,
        tallaL: 0,
        tallaM: 1,
        tallaS: 0
      },
      {
        tela: "Win Fresh",
        codigo: "FUT173",
        descripcion: "Chaleco Hombre Futsalero",
        link: "https://res.cloudinary.com/demo/image/upload/sample.jpg",
        precio: 25,
        stock: 0,
        talla10: 0,
        talla12: 0,
        talla14: 0,
        talla16: 0,
        tallaL: 0,
        tallaM: 0,
        tallaS: 0
      }
    ];

    const numeroWhatsapp = "51912381233";

    function obtenerTallasDisponibles(producto) {
      const mapa = [
        { key: "talla10", label: "10" },
        { key: "talla12", label: "12" },
        { key: "talla14", label: "14" },
        { key: "talla16", label: "16" },
        { key: "tallaS", label: "S" },
        { key: "tallaM", label: "M" },
        { key: "tallaL", label: "L" }
      ];

      return mapa
        .filter(t => Number(producto[t.key]) > 0)
        .map(t => t.label);
    }

    function crearMensajeWhatsApp(producto) {
      return encodeURIComponent(
        `Hola, quiero pedir este producto:%0A` +
        `${producto.descripcion}%0A` +
        `Tela: ${producto.tela}%0A` +
        `Código: ${producto.codigo}%0A` +
        `Precio: S/ ${producto.precio}`
      );
    }

    function crearCard(producto) {
      const tallasDisponibles = obtenerTallasDisponibles(producto);
      const tieneStock = Number(producto.stock) > 0;
      const estadoClase = tieneStock ? "disponible" : "preventa";
      const estadoTexto = tieneStock ? "Stock disponible" : "Stock para Producción";
      const whatsappLink = `https://wa.me/${numeroWhatsapp}?text=${crearMensajeWhatsApp(producto)}`;

      return `
        <div class="card">
          <div class="card-img-wrap">
            <img class="card-img" src="${producto.link}" alt="${producto.descripcion}">
          </div>

          <div class="card-body">
            <div class="card-title">${producto.descripcion}</div>
            <div class="card-subtitle">${producto.tela}</div>

            <div class="card-extra">
              <div class="campo"><strong>Código:</strong> ${producto.codigo}</div>
              <div class="descripcion">${producto.descripcion}</div>
            </div>

            <div class="precio"><small>S/</small>${producto.precio}</div>

            <div class="tallas">
              ${tallasDisponibles.length ? tallasDisponibles.join(" / ") : "PRE-VENTA"}
            </div>

            <div class="estado ${estadoClase}">
              <span class="check">✔</span>
              <span>${estadoTexto}</span>
            </div>

            <a class="btn-whatsapp" href="${whatsappLink}" target="_blank">
              Pedir por WhatsApp
            </a>
          </div>
        </div>
      `;
    }

    document.getElementById("productosGrid").innerHTML = productos.map(crearCard).join("");
  </script>
</body>
</html>
