<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Disponible</title>

<style>
*{box-sizing:border-box;}

html, body{
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family: Arial, sans-serif;
  background:#f3f0df;
  color:#222;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px 14px;
}

h2{
  margin:0 0 20px 0;
  font-size:28px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
}

/* CARD */
.card{
  background:#f8f4e8;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.10);
  border:1px solid rgba(0,0,0,0.04);
  transition:transform .25s ease, box-shadow .25s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 24px rgba(0,0,0,0.14);
}

/* IMAGEN */
.card-img-wrap{
  overflow:hidden;
  cursor:pointer;
  background:#f8f4e8;
}

.card img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:contain;
  display:block;
  transition:transform .4s ease;
}

.card:hover img{
  transform:scale(1.05);
}

/* CONTENIDO */
.card-content{
  padding:14px 14px 16px;
}

.descripcion{
  text-align:center;
  font-size:15px;
  letter-spacing:2px;
  color:#6b6658;
  text-transform:uppercase;
  margin-bottom:10px;
  padding-bottom:10px;
  border-bottom:1px solid rgba(0,0,0,0.08);
}

.info-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:12px;
  margin-bottom:10px;
}

.tela{
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#6f6a5d;
  font-weight:600;
}

.precio{
  font-size:22px;
  font-weight:800;
  color:#333;
  white-space:nowrap;
}

.tallas{
  text-align:center;
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#5f5a4f;
  margin:10px 0 12px;
  padding:6px 10px;
  background:rgba(0,0,0,0.04);
  border-radius:8px;
}

.estado{
  text-align:center;
  font-weight:700;
  font-size:15px;
  margin:8px 0 10px;
}

.estado.ok{
  color:#178f30;
}

.estado.preventa{
  color:#9a6a00;
}

.entrega{
  text-align:center;
  font-size:12px;
  color:#6f6a5d;
  margin-top:6px;
  line-height:1.35;
}

/* BOTÓN */
.btn{
  display:block;
  width:100%;
  margin-top:12px;
  padding:12px 10px;
  color:#fff;
  text-decoration:none;
  border-radius:12px;
  font-weight:700;
  font-size:14px;
  text-align:center;
}

.btn-stock{
  background:#20d15a;
}

.btn-preventa{
  background:#111;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:20px;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
  background:#fff;
}

.cerrar{
  position:absolute;
  top:16px;
  right:24px;
  color:#fff;
  font-size:38px;
  cursor:pointer;
  line-height:1;
}

/* TABLET */
@media (max-width:950px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

/* CEL */
@media (max-width:600px){
  .grid{
    grid-template-columns:1fr;
    gap:14px;
  }

  .card:hover{
    transform:none;
  }

  .card:hover img{
    transform:none;
  }

  .descripcion{
    font-size:14px;
    letter-spacing:1.5px;
  }

  .tela{
    font-size:13px;
    letter-spacing:2px;
  }

  .precio{
    font-size:20px;
  }

  .tallas{
    font-size:13px;
    letter-spacing:2px;
  }

  .estado{
    font-size:14px;
  }

  .btn{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🔥 Stock Disponible</h2>
  <div class="grid" id="catalogo"></div>
</div>

<div class="modal" id="modal">
  <span class="cerrar" onclick="cerrarModal()">×</span>
  <img id="imgModal" alt="Vista previa">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIo_-P6TV2ZkDIo_fVzq_Ty0Z_xMtZHM",
  authDomain: "stockingenio.firebaseapp.com",
  projectId: "stockingenio",
  storageBucket: "stockingenio.firebasestorage.app",
  messagingSenderId: "1052238909039",
  appId: "1:1052238909039:web:bd620817ee76e9853a66aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const contenedor = document.getElementById("catalogo");
const numero = "51912381233";

window.abrirModal = function(src){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = src;
};

window.cerrarModal = function(){
  document.getElementById("modal").style.display = "none";
};

function obtenerTallasDisponibles(item){
  const tallas = [];

  if (Number(item.talla10 || 0) > 0) tallas.push("10");
  if (Number(item.talla12 || 0) > 0) tallas.push("12");
  if (Number(item.talla14 || 0) > 0) tallas.push("14");
  if (Number(item.talla16 || 0) > 0) tallas.push("16");

  if (Number(item.tallaS || 0) > 0) tallas.push("S");
  if (Number(item.tallaM || 0) > 0) tallas.push("M");
  if (Number(item.tallaL || 0) > 0) tallas.push("L");

  if (Number(item.tallaSD || 0) > 0) tallas.push("SD");
  if (Number(item.tallaMD || 0) > 0) tallas.push("MD");
  if (Number(item.tallaLD || 0) > 0) tallas.push("LD");

  return tallas;
}

function fechaEntregaMas7Dias(){
  const fecha = new Date();
  fecha.setDate(fecha.getDate() + 7);

  return fecha.toLocaleDateString("es-PE", {
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}

function formatearPrecio(precio){
  return `S/ ${Number(precio || 0)}`;
}

async function cargarCatalogo(){
  const ref = doc(db, "catalogos", "stock");
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const productos = snap.data().productos || [];

  productos.forEach(item => {
    const tallas = obtenerTallasDisponibles(item);
    const hayStock = Number(item.stock || 0) > 0 && tallas.length > 0;

    const descripcion = item.descripcion || "";
    const tela = item.Tela || item.tela || "";

    const mensajeStock =
      `https://wa.me/${numero}?text=` +
      `🔥%20Quiero%20esta%20prenda%20en%20stock%0A%0A` +
      `👕%20Modelo:%20${encodeURIComponent(item.codigo || "")}%0A` +
      `🧵%20Tela:%20${encodeURIComponent(tela)}%0A` +
      `📏%20Tallas:%20${encodeURIComponent(tallas.join(" / "))}%0A` +
      `💰%20Precio:%20${encodeURIComponent(formatearPrecio(item.precio))}%0A` +
      `🖼️%20Imagen:%20${encodeURIComponent(item.link || "")}`;

    const mensajePreventa =
      `https://wa.me/${numero}?text=` +
      `🟠%20Quiero%20pedir%20esta%20prenda%20en%20preventa%0A%0A` +
      `👕%20Modelo:%20${encodeURIComponent(item.codigo || "")}%0A` +
      `🧵%20Tela:%20${encodeURIComponent(tela)}%0A` +
      `💰%20Precio:%20${encodeURIComponent(formatearPrecio(item.precio))}%0A` +
      `📦%20Entrega:%20${encodeURIComponent(fechaEntregaMas7Dias())}%0A` +
      `🖼️%20Imagen:%20${encodeURIComponent(item.link || "")}`;

    const estadoHtml = hayStock
      ? `<div class="estado ok">✅ Stock disponible</div>`
      : `<div class="estado preventa">PRE-VENTA</div>`;

    const tallasHtml = hayStock
      ? `<div class="tallas">${tallas.join(" / ")}</div>`
      : `<div class="tallas">Bajo pedido</div>`;

    const botonHtml = hayStock
      ? `<a href="${mensajeStock}" target="_blank" class="btn btn-stock">🟢 Pedir por WhatsApp</a>`
      : `<a href="${mensajePreventa}" target="_blank" class="btn btn-preventa">Pedir en preventa</a>`;

    const entregaHtml = hayStock
      ? ``
      : `<div class="entrega">Entrega estimada: ${fechaEntregaMas7Dias()}</div>`;

    contenedor.innerHTML += `
      <div class="card">
        <div class="card-img-wrap">
          <img src="${item.link}" alt="Producto" onclick="abrirModal('${item.link}')">
        </div>

        <div class="card-content">
          <div class="descripcion">${descripcion}</div>

          <div class="info-row">
            <div class="tela">${tela}</div>
            <div class="precio">${formatearPrecio(item.precio)}</div>
          </div>

          ${tallasHtml}
          ${estadoHtml}
          ${entregaHtml}
          ${botonHtml}
        </div>
      </div>
    `;
  });
}

cargarCatalogo();
</script>

</body>
</html>
