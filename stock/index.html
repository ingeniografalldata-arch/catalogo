<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
}

.container{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:20px;
}

.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

/* imagen cuadrada */
.img-container{
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  background:#fff;
}

.img-container img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:0.3s;
}

.img-container:hover img{
  transform:scale(1.1);
}

.info{
  padding:15px;
}

.nombre{
  font-weight:bold;
  margin-bottom:10px;
}

.precio{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.stock{
  font-size:14px;
  margin-bottom:8px;
}

.tallas{
  font-size:13px;
  margin-bottom:12px;
}

.btn{
  display:block;
  text-align:center;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.btn-pedir{
  background:#111;
  color:#fff;
}

.btn-preventa{
  background:#999;
  color:#fff;
}

/* responsive */
@media(max-width:1000px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
