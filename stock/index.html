<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Disponible</title>

<style>
*{box-sizing:border-box;}

html, body{
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  color:#111;
}

.container{
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:20px 12px;
}

h2{
  margin:0 0 20px 0;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* IMAGEN */
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
}

/* CONTENIDO */
.card-content{
  padding:12px;
  text-align:center;
}

.estado{
  font-weight:bold;
  margin-bottom:8px;
}

.estado.ok{ color:#138a36; }
.estado.preventa{ color:#c46b00; }

.tallas{
  font-size:14px;
  margin-bottom:10px;
}

.entrega{
  font-size:13px;
  color:#666;
}

/* BOTONES */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.btn-stock{ background:#25D366; }
.btn-preventa{ background:#111; }

/* MOBILE */
@media (max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🔥 Stock Disponible</h2>
  <div class="grid" id="catalogo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDIo_-P6TV2ZkDIo_fVzq_Ty0Z_xMtZHM",
  authDomain: "stockingenio.firebaseapp.com",
  projectId: "stockingenio",
  storageBucket: "stockingenio.firebasestorage.app",
  messagingSenderId: "1052238909039",
  appId: "1:1052238909039:web:bd620817ee76e9853a66aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const contenedor = document.getElementById("catalogo");
const numero = "51912381233";

/* FUNCIONES */
function obtenerTallasDisponibles(item){
  const tallas = [];

  if (item.talla10 > 0) tallas.push("10");
  if (item.talla12 > 0) tallas.push("12");
  if (item.talla14 > 0) tallas.push("14");
  if (item.talla16 > 0) tallas.push("16");
  if (item.tallaS > 0) tallas.push("S");
  if (item.tallaM > 0) tallas.push("M");
  if (item.tallaL > 0) tallas.push("L");
  if (item.tallaSD > 0) tallas.push("SD");
  if (item.tallaMD > 0) tallas.push("MD");
  if (item.tallaLD > 0) tallas.push("LD");

  return tallas;
}

function fechaEntregaMas7Dias(){
  const fecha = new Date();
  fecha.setDate(fecha.getDate() + 7);

  return fecha.toLocaleDateString("es-PE", {
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}

/* CARGAR DATOS */
async function cargarCatalogo(){
  const ref = doc(db, "catalogos", "stock");
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    console.log("No hay datos en Firebase");
    return;
  }

  const productos = snap.data().productos;

  productos.forEach(item => {

    const tallas = obtenerTallasDisponibles(item);
    const hayStock = tallas.length > 0 && item.stock > 0;

    const mensajeStock =
      `https://wa.me/${numero}?text=` +
      `🔥%20Quiero%20esta%20prenda%20en%20stock%0A%0A` +
      `👕%20Modelo:%20${encodeURIComponent(item.codigo)}%0A` +
      `📏%20Tallas:%20${encodeURIComponent(tallas.join(", "))}%0A` +
      `🖼️%20Imagen:%20${encodeURIComponent(item.link)}`;

    const mensajePreventa =
      `https://wa.me/${numero}?text=` +
      `🟠%20Quiero%20preventa%0A%0A` +
      `👕%20Modelo:%20${encodeURIComponent(item.codigo)}%0A` +
      `🖼️%20Imagen:%20${encodeURIComponent(item.link)}%0A` +
      `📦%20Entrega:%20${encodeURIComponent(fechaEntregaMas7Dias())}`;

    const estadoHtml = hayStock
      ? `<div class="estado ok">✅ Stock disponible</div>`
      : `<div class="estado preventa">🟠 Preventa</div>`;

    const tallasHtml = hayStock
      ? `<div class="tallas">Tallas: <strong>${tallas.join(", ")}</strong></div>`
      : `<div class="tallas">Disponible bajo pedido</div>`;

    const botonHtml = hayStock
      ? `<a href="${mensajeStock}" target="_blank" class="btn btn-stock">🟢 Pedir por WhatsApp</a>`
      : `<a href="${mensajePreventa}" target="_blank" class="btn btn-preventa">Pedir en preventa</a>`;

    const entregaHtml = hayStock
      ? ``
      : `<div class="entrega">Entrega: ${fechaEntregaMas7Dias()}</div>`;

    contenedor.innerHTML += `
      <div class="card">
        <img src="${item.link}" alt="${item.codigo}">
        <div class="card-content">
          ${estadoHtml}
          ${tallasHtml}
          ${botonHtml}
          ${entregaHtml}
        </div>
      </div>
    `;
  });
}

cargarCatalogo();
</script>

</body>
</html>
