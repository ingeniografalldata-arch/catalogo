<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Disponible</title>

<style>
*{box-sizing:border-box;}

html, body{
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  background:#f2f2f2;
}

/* CONTENEDOR */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  cursor:pointer;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-4px);
}

/* IMAGEN */
.card img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:contain;
  background:#fff;
  transition: transform 0.4s ease;
}

.card:hover img{
  transform:scale(1.08);
}

/* CONTENIDO */
.card-content{
  padding:12px;
  text-align:center;
}

.estado{
  font-weight:bold;
  margin-bottom:8px;
}

.estado.ok{ color:#138a36; }
.estado.preventa{ color:#c46b00; }

.tallas{
  font-size:14px;
  margin-bottom:10px;
}

.entrega{
  font-size:13px;
  color:#666;
}

/* BOTÓN */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.btn-stock{ background:#25D366; }
.btn-preventa{ background:#111; }

/* 🔥 MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

.cerrar{
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:35px;
  cursor:pointer;
}

/* RESPONSIVE */
@media (max-width:900px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }

  .card:hover img{
    transform:none;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🔥 Stock Disponible</h2>
  <div class="grid" id="catalogo"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="cerrar" onclick="cerrarModal()">×</span>
  <img id="imgModal">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDIo_-P6TV2ZkDIo_fVzq_Ty0Z_xMtZHM",
  authDomain: "stockingenio.firebaseapp.com",
  projectId: "stockingenio",
  storageBucket: "stockingenio.firebasestorage.app",
  messagingSenderId: "1052238909039",
  appId: "1:1052238909039:web:bd620817ee76e9853a66aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const contenedor = document.getElementById("catalogo");
const numero = "51912381233";

/* FUNCIONES */
function obtenerTallasDisponibles(item){
  const tallas = [];

  if (item.talla10 > 0) tallas.push("10");
  if (item.talla12 > 0) tallas.push("12");
  if (item.talla14 > 0) tallas.push("14");
  if (item.talla16 > 0) tallas.push("16");
  if (item.tallaS > 0) tallas.push("S");
  if (item.tallaM > 0) tallas.push("M");
  if (item.tallaL > 0) tallas.push("L");
  if (item.tallaSD > 0) tallas.push("SD");
  if (item.tallaMD > 0) tallas.push("MD");
  if (item.tallaLD > 0) tallas.push("LD");

  return tallas;
}

function fechaEntregaMas7Dias(){
  const fecha = new Date();
  fecha.setDate(fecha.getDate() + 7);

  return fecha.toLocaleDateString("es-PE", {
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}

/* MODAL */
window.abrirModal = function(src){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = src;
}

window.cerrarModal = function(){
  document.getElementById("modal").style.display = "none";
}

/* CARGAR DATOS */
async function cargarCatalogo(){
  const ref = doc(db, "catalogos", "stock");
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const productos = snap.data().productos;

  productos.forEach(item => {

    const tallas = obtenerTallasDisponibles(item);
    const hayStock = item.stock > 0;

    const mensajeStock =
      `https://wa.me/${numero}?text=Quiero%20${item.codigo}`;

    const mensajePreventa =
      `https://wa.me/${numero}?text=Preventa%20${item.codigo}`;

    contenedor.innerHTML += `
      <div class="card">
        <img src="${item.link}" onclick="abrirModal('${item.link}')">
        <div class="card-content">
          <div class="estado ${hayStock ? 'ok':'preventa'}">
            ${hayStock ? '✅ Stock disponible':'🟠 Preventa'}
          </div>

          <div class="tallas">
            ${tallas.length ? 'Tallas: ' + tallas.join(', ') : 'Sin stock'}
          </div>

          <a href="${hayStock ? mensajeStock : mensajePreventa}" target="_blank"
             class="btn ${hayStock ? 'btn-stock':'btn-preventa'}">
             ${hayStock ? 'Pedir por WhatsApp':'Pedir preventa'}
          </a>
        </div>
      </div>
    `;
  });
}

cargarCatalogo();
</script>

</body>
</html>
