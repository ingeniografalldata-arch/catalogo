<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Speed Sport</title>

<style>
*{box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#e6e6e6;
  margin:0;
}

/* 🔥 BANNER */
.banner{
  width:100%;
  height:220px;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* CONTENEDOR */
.container{
  max-width:1600px; /* 🔥 más grande */
  margin:auto;
  padding:25px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); /* 🔥 +30% */
  gap:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  text-align:center;
}

/* IMAGEN */
.card img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.card{
  overflow:hidden;
}

.card img{
  transition: transform 0.4s ease;
}

.card:hover img{
  transform: scale(1.08);
}

/* BOTON */
.btn{
  margin-top:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#25D366;
  color:#fff;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  font-size:15px;
}

.btn svg{
  width:20px;
  height:20px;
  fill:white;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal img{
  max-width:95%;
  max-height:90%;
  border-radius:12px;
}

.cerrar{
  position:absolute;
  top:20px;
  right:25px;
  color:white;
  font-size:35px;
  cursor:pointer;
}

  .btn:active{
  transform: scale(0.96);
}
  

/* 📱 CELULAR */
@media (max-width:600px){

  .banner{
    height:90px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr); /* 🔥 2 imágenes */
    gap:12px;
  }

  .card{
    padding:10px;
  }

  .btn{
    font-size:13px;
    padding:8px;
  }

}
</style>
</head>

<body>

<!-- 🔥 BANNER -->
<div class="banner">
  <img src="https://res.cloudinary.com/dxzvkiqra/image/upload/f_auto,q_auto,c_fill,w_1600,h_300/banerfut_jabrqy.png">
</div>

<div class="container">
  <div class="grid" id="catalogo"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="cerrar" onclick="cerrarModal()">×</span>
  <img id="imgGrande">
</div>

<script>

const numero="51912381233";

function abrirModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("imgGrande").src=src;
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

fetch("imagenes.txt")
.then(res=>res.text())
.then(data=>{

  const links=data.split("\n").map(l=>l.trim()).filter(l=>l);
  const cont=document.getElementById("catalogo");

  links.forEach(link=>{

    let nombre=link.split("/").pop().split(".")[0];
    nombre=nombre.split("_")[0];

    const wa=`https://wa.me/${numero}?text=
🔥 Me gusta este diseño

👕 Modelo: ${nombre}
🖼️ Imagen: ${link}`;

    cont.innerHTML+=`
    <div class="card">
      <img src="${link}" onclick="abrirModal('${link}')">
      <a href="${encodeURI(wa)}" target="_blank" class="btn">

        <svg viewBox="0 0 32 32">
          <path d="M16.03 3.2c-7.07 0-12.8 5.73-12.8 12.8 0 2.26.59 4.38 1.62 6.23L3.2 28.8l6.72-1.61a12.74 12.74 0 0 0 6.11 1.56h.01c7.07 0 12.8-5.73 12.8-12.8S23.1 3.2 16.03 3.2z"/>
        </svg>

        Pedir por WhatsApp
      </a>
    </div>
    `;
  });

});

</script>

</body>
</html>
