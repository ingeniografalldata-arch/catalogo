<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Speed Sport</title>

<style>
*{box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#e6e6e6;
  margin:0;
}

/* 🔥 BANNER FULL */
.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* GRID */
.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* BOTON WHATSAPP */
.btn{
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#25D366;
  color:#fff;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.btn svg{
  width:18px;
  height:18px;
  fill:white;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal img{
  max-width:95%;
  max-height:90%;
}

.cerrar{
  position:absolute;
  top:20px;
  right:25px;
  color:white;
  font-size:35px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- 🔥 BANNER -->
<div class="banner">
  <img src="banerfut.png">
</div>

<div class="container">
  <div class="grid" id="catalogo"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="cerrar" onclick="cerrarModal()">×</span>
  <img id="imgGrande">
</div>

<script>

const numero="51912381233";

function abrirModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("imgGrande").src=src;
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

fetch("imagenes.txt")
.then(res=>res.text())
.then(data=>{

  const links=data.split("\n").map(l=>l.trim()).filter(l=>l);
  const cont=document.getElementById("catalogo");

  links.forEach(link=>{

    let nombre=link.split("/").pop().split(".")[0];
    nombre=nombre.split("_")[0];

    const wa=`https://wa.me/${numero}?text=
🔥 Me gusta este diseño

👕 Modelo: ${nombre}
🖼️ Imagen: ${link}`;

    cont.innerHTML+=`
    <div class="card">
      <img src="${link}" onclick="abrirModal('${link}')">
      <a href="${encodeURI(wa)}" target="_blank" class="btn">
        
        <!-- ICONO WHATSAPP -->
        <svg viewBox="0 0 32 32">
          <path d="M16.03 3.2c-7.07 0-12.8 5.73-12.8 12.8 0 2.26.59 4.38 1.62 6.23L3.2 28.8l6.72-1.61a12.74 12.74 0 0 0 6.11 1.56h.01c7.07 0 12.8-5.73 12.8-12.8S23.1 3.2 16.03 3.2zm0 23.31h-.01a10.53 10.53 0 0 1-5.37-1.47l-.38-.23-3.99.96.98-3.89-.25-.4a10.5 10.5 0 1 1 9.02 5.03z"/>
        </svg>

        Pedir por WhatsApp
      </a>
    </div>
    `;
  });

});

</script>

</body>
</html>
